# ════════════════════════════════════════════════════════════════════
#  tmux configuration
# ════════════════════════════════════════════════════════════════════

# ── 调色板 ──────────────────────────────────────────────────────────
# 颜色集中在此, 改一处即全局生效。
# 样式选项(style)用 `set -gF` —— 设置时就把 #{@var} 展开成颜色值;
# 含动态字段的格式选项(format)用 `set -g` —— #{@var} 在绘制时展开,
# 这类行不能加 -F, 否则 #{?...}、#{pane_current_path} 等会被一次性冻结。
set -g @c_green     '#56d364'   # pane 边框 (激活/非激活同色)
set -g @c_green_mid '#238636'   # 标题条底色 (激活/非激活同色)
set -g @c_green_bg  '#11331e'   # 激活 pane 背景
set -g @c_green_txt '#dafbe1'   # 标题文字
set -g @c_accent    '#3fb950'   # 状态栏: 徽章 / 当前窗口 / 时钟 / 电量
set -g @c_magenta   '#db61a2'   # PREFIX 指示器 / 响铃高亮
set -g @c_red       'colour1'   # SYNC 广播
set -g @c_cyan      'colour14'  # 选区 / 消息 / 菜单
set -g @c_ink       '#22272e'   # 深底 / 反白文字
set -g @c_fg        '#768390'   # 状态栏前景
set -g @c_bg        '#2d333b'   # 状态栏背景
set -g @c_dim       '#444c56'   # 分隔线

# ── 基础 ────────────────────────────────────────────────────────────
set -g prefix C-g                 # 前缀键改用 Ctrl-g
unbind C-b
setw -g mode-keys vi              # copy-mode 使用 vi 键位
set -g allow-rename off           # 禁止程序自动改窗口名
set -g base-index 1               # 窗口编号从 1 起
set -g pane-base-index 1          # pane 编号从 1 起
set -g renumber-windows on        # 关窗后自动重排编号
set -g detach-on-destroy off      # 关掉最后一个窗口时切到下个 session, 不掉线
set -g aggressive-resize on       # 按当前 attach 的 client 尺寸渲染
set -g history-limit 100000       # 每个 pane 保留 10 万行回滚
set -g mouse on                   # 鼠标滚动 / 选区 / 切 pane
set -sg escape-time 10            # 缩短 ESC 延迟, vim 退插入模式不卡
set -g focus-events on            # 转发焦点事件, vim 可感知

# 真彩色 (RGB), 避免 Neovim 主题降级到 256 色
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
# 放行透传转义序列 (Claude 进度条 OSC 9;4 / 通知 / 剪贴板等不被 tmux 吞掉)
set -g allow-passthrough on

# ── 按键绑定 ────────────────────────────────────────────────────────
# 切 pane (h/j/k/l) 与 缩放 pane (大写, -r 可连按)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# nvim ↔ tmux 无缝切窗格: pane 里跑 vim/nvim 时 C-hjkl 透传给它切窗口, 否则 tmux 切 pane
bind -n C-h if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +([^[:space:]]+/)?g?(view|l?n?vim?x?|fzf)(diff)?$'" 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +([^[:space:]]+/)?g?(view|l?n?vim?x?|fzf)(diff)?$'" 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +([^[:space:]]+/)?g?(view|l?n?vim?x?|fzf)(diff)?$'" 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +([^[:space:]]+/)?g?(view|l?n?vim?x?|fzf)(diff)?$'" 'send-keys C-l' 'select-pane -R'
bind C-l send-keys C-l   # 清屏改用 prefix C-l (C-l 已被无缝切占用)
bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R

# 新建窗口 / 分屏都保留当前目录
bind c new-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind Tab last-window                                    # l 已用于切 pane, 用 Tab 回上个窗口
bind T command-prompt -p "pane 标题:" "select-pane -T '%%'"   # 命名当前 pane (显示在边框)
bind r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"

# 弹窗工具 (ESC 关闭, 不打乱布局)
bind G display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "lazygit"
bind ! display-popup -E -w 80% -h 80% -d "#{pane_current_path}"

# ── 复制模式 (vi) ───────────────────────────────────────────────────
# v 选区 / y 复制到系统剪贴板; 鼠标拖选、双击选词、三击选行同样直通 pbcopy。
bind / copy-mode \; send-keys ?                         # 进 copy-mode 并反向搜索
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send -X select-word \; run-shell -d 0.3 \; send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi TripleClick1Pane select-pane \; send -X select-line \; run-shell -d 0.3 \; send -X copy-pipe-and-cancel "pbcopy"
# copy-mode 之外的双击/三击: tmux 默认只进内部 buffer, 这里改成直通系统剪贴板
bind -n DoubleClick1Pane select-pane -t = \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" 'send -M' 'copy-mode -H ; send -X select-word ; run-shell -d 0.3 ; send -X copy-pipe-and-cancel "pbcopy"'
bind -n TripleClick1Pane select-pane -t = \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" 'send -M' 'copy-mode -H ; send -X select-line ; run-shell -d 0.3 ; send -X copy-pipe-and-cancel "pbcopy"'

# ── Claude CLI 工作流 ───────────────────────────────────────────────
bind C new-window -c "#{pane_current_path}" "claude"        # 新窗口跑 claude
bind D split-window -h -c "#{pane_current_path}" "claude"   # 右侧分屏跑 claude
bind A display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "claude"   # 浮窗跑一次性 claude
bind Y run-shell "tmux capture-pane -pS -200 | pbcopy" \; display "已复制当前 pane 最近 200 行到剪贴板 (可粘给 claude)"
bind S setw synchronize-panes \; display "sync-panes: #{?pane_synchronized,ON,OFF}"   # 广播输入到所有 pane

# ── 外观 · pane 边框与背景 ──────────────────────────────────────────
# 边框显示标题; 标题条激活/非激活同色 (亮底会压住文字), 区分靠边框线宽 + 激活 pane 底色 + 激活加粗。
set -g pane-border-status top
set -g pane-border-format '#[bg=#{@c_green_mid}]#[fg=#{@c_green_txt}]#{?pane_active,#[bold],} #{pane_index}: #{pane_title} #[default]'
set -gF pane-border-style 'fg=#{@c_green},bold'
set -gF pane-active-border-style 'fg=#{@c_green},bold'
set -g pane-border-lines heavy           # 激活 pane 边框加粗 —— 全屏程序也压不掉, 是主力区分
set -g pane-border-indicators colour     # 不画箭头
# 激活 pane 铺暗绿底; 非激活用默认底。vim/claude 等全屏程序会盖掉它, 仅 shell/空白处可见。
set -gF window-active-style 'bg=#{@c_green_bg}'
set -g window-style 'bg=terminal'

# ── 状态栏 ──────────────────────────────────────────────────────────
set -gF status-style 'bg=#{@c_bg},fg=#{@c_fg}'
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 90
# 左: 前缀指示 (tmux / 按下变 PREFIX) + 广播时红色 SYNC
set -g status-left '#{?client_prefix,#[bg=#{@c_magenta}]#[fg=#{@c_ink}]#[bold] PREFIX ,#[bg=#{@c_accent}]#[fg=#{@c_ink}]#[bold] tmux }#{?pane_synchronized,#[bg=#{@c_red}]#[fg=#{@c_ink}]#[bold] SYNC ,}#[default] '
# 窗口列表, 当前窗口高亮
set -g window-status-format '#[fg=#{@c_fg}] #I #W '
set -g window-status-current-format '#[bg=#{@c_accent},fg=#{@c_ink},bold] #I #W '
set -g window-status-separator ''
# 右: 目录 · 电量 · 日期时间
set -g status-right '#[fg=#{@c_fg}] #{b:pane_current_path} #[fg=#{@c_dim}]│#[fg=#{@c_accent}] #(~/.tmux/battery.sh)%% #[fg=#{@c_dim}]│#[fg=#{@c_ink},bg=#{@c_accent},bold] %Y-%m-%d %H:%M #[default]'

# 后台任务高亮: activity 持续输出会一直亮, 关掉。
# bell 曾用来标记"跑完", 但 vim、zsh tab 补全等都会发 bell, 误报太多;
# claude 跑完的提醒改由 claude 自身的 Stop hook 精确触发 (afplay + terminal-notifier),
# 这里关掉 bell 监听, 不再把杂散响铃当成"跑完了"。
set -g monitor-activity off
set -g visual-activity off
set -g monitor-bell off
set -g visual-bell off

# ── 选区 / 消息 / 菜单配色 ──────────────────────────────────────────
set -gF mode-style 'bg=#{@c_cyan},fg=#{@c_ink}'
set -gF menu-selected-style 'bg=#{@c_cyan},fg=#{@c_ink}'
set -gF message-style 'bg=#{@c_cyan},fg=#{@c_ink}'
set -gF message-command-style 'bg=#{@c_cyan},fg=#{@c_ink}'

# ── 插件 ────────────────────────────────────────────────────────────
# tmux-thumbs: 一键抓屏上的 path/hash/URL 到剪贴板
set -g @thumbs-key F
set -g @thumbs-command 'echo -n {} | pbcopy'
# resurrect / continuum: 自动保存并恢复布局 (含 pane 内容与指定程序)
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'nvim vim claude lazygit btop htop'
set -g @continuum-save-interval '60'
set -g @continuum-restore 'on'
# run-shell 必须放最后: continuum 会往 status-right 注入自动保存钩子,
# 若插件早于 status-right 加载, 钩子会被后面的 set status-right 覆盖 (只能恢复、不能保存)。
run-shell ~/.tmux/tmux-resurrect/resurrect.tmux
run-shell ~/.tmux/tmux-continuum/continuum.tmux
run-shell ~/.tmux/tmux-thumbs/tmux-thumbs.tmux
run-shell ~/.tmux/tmux-logging/logging.tmux
